name: Test
on: [push, pull_request, workflow_dispatch]
jobs:
  Test-Linux:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose --test binary_integration_test -- --nocapture